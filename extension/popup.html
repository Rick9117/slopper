<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 260px;
      margin: 0;
      padding: 16px;
      font-family: system-ui, sans-serif;
      background: #1e1e1e;
      color: #eee;
    }
    h3 {
      margin: 0 0 14px 0;
      font-size: 18px;
      letter-spacing: 0.5px;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-radius: 8px;
      background: #2a2a2a;
      margin-bottom: 16px;
    }
    #power-label { font-weight: bold; }
    #power-label.on  { color: #4caf50; }
    #power-label.off { color: #e53935; }

    .mode {
      display: block;
      padding: 10px 12px;
      margin-bottom: 8px;
      border-radius: 8px;
      background: #2a2a2a;
      border-left: 5px solid #555;
      cursor: pointer;
    }
    .mode.mom.selected { border-left-color: #4caf50; background: #23331f; }
    .mode.dad.selected { border-left-color: #e53935; background: #331f1f; }
    .mode.nsfw.selected { border-left-color: #000; background: #000; }
    .mode-title { font-weight: bold; }
    .hint { font-size: 12px; color: #aaa; margin-top: 3px; }
    input[type="radio"], input[type="checkbox"] { margin-right: 6px; }

    .setting {
      margin-top: 18px;
      padding: 12px;
      background: #2a2a2a;
      border-radius: 8px;
    }
    .setting-head {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 10px;
    }
    #limit-value { font-weight: bold; color: #4caf50; }

    #timer-arrow {
      display: inline-block;
      margin-left: 6px;
      color: #aaa;
      transition: transform 0.2s;
    }
    #timer-arrow.open { transform: rotate(180deg); }

    #limit-slider {
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      border-radius: 3px;
      background: #444;
      outline: none;
    }
    #limit-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #4caf50;
      cursor: pointer;
    }
  
    .timer { margin-top: 18px; cursor: pointer; }
    .timer-head {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 6px;
    }
    #timer-time  { font-weight: bold; }
    #timer-limit { color: #aaa; }
    .bar-track {
      height: 14px;
      background: #2a2a2a;
      border-radius: 7px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 7px;
      transition: width 0.3s, background 0.3s;
    }
    .breakdown {
      display: none;
      margin-top: 10px;
      padding: 8px 12px;
      background: #2a2a2a;
      border-radius: 8px;
      font-size: 12px;
    }
    .breakdown.open { display: block; }
    .breakdown-row {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
    }
    .breakdown-row span:last-child { color: #aaa; }
    .breakdown-empty { color: #aaa; }
  </style>
</head>
<body>
  <h3>Slopper</h3>

  <div class="toggle-row">
    <span>Extension</span>
    <label>
      <input type="checkbox" id="power">
      <span id="power-label">ON</span>
    </label>
  </div>

  <label class="mode mom" id="mom-card">
    <input type="radio" name="mode" value="mom">
    <span class="mode-title">Mom mode</span>
    <div class="hint">(Gentle) Suggests you take a break, is dismissible but still watches you.</div>
  </label>

  <label class="mode dad" id="dad-card">
    <input type="radio" name="mode" value="dad">
    <span class="mode-title">Dad mode</span>
    <div class="hint">(Commanding) Forces you to stop watching the slop.</div>
  </label>

  <label class="mode nsfw" id="nsfw-card">
    <input type="checkbox" id="nsfw">
    <span class="mode-title">NSFW language (18+)</span>
    <div class="hint">Strong wording in both modes.</div>
  </label>

  <div class="setting">
    <div class="setting-head">
      <span>Daily limit</span>
      <span id="limit-value">10 min</span>
    </div>
    <input type="range" id="limit-slider" min="10" max="60" step="5" value="10">
  </div>

  <div class="timer" id="timer-toggle">
    <div class="timer-head">
      <span id="timer-time">0m 0s</span>
      <span>
        <span id="timer-limit">/ 10m 0s</span>
        <span id="timer-arrow">▾</span>
      </span>
    </div>
    <div class="bar-track">
      <div class="bar-fill" id="bar-fill"></div>
    </div>
    <div class="breakdown" id="breakdown"></div>
  </div>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
